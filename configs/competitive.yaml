num_iterations: 30000
log_every: 100
save_every: 1000
sh_degree: 3
lambda_ssim: 0.2
lambda_lpips: 0.0
lpips_net: alex

background:
  learnable: true
  color: [0.5, 0.5, 0.5]

lr_decay:
  enabled: true
  final_factor: 0.01

densification:
  enabled: true
  from_iter: 500
  until_iter: 15000
  every: 100
  grad_threshold: 0.0002
  max_new_points: 3000
  jitter_scale: 0.25
  scale_shrink: 0.8
  max_points: 500000

pruning:
  enabled: true
  every: 1000
  opacity_threshold: 0.003
  min_points: 5000

opacity_reset:
  enabled: true
  every: 3000
  value: 0.1

learning_rates:
  means_lr: 0.00016
  scales_lr: 0.005
  quats_lr: 0.001
  opacities_lr: 0.05
  colors_lr: 0.0025
  background_lr: 0.0025
