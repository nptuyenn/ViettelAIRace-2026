num_iterations: 35000
log_every: 100
save_every: 1000
sh_degree: 3
lambda_ssim: 0.22
lambda_lpips: 0.0
lpips_net: alex

background:
  learnable: true
  color: [0.5, 0.5, 0.5]

render:
  rasterize_mode: antialiased
  absgrad: true

lr_decay:
  enabled: true
  final_factor: 0.01

densification:
  enabled: true
  strategy: clone_split
  accumulate: true
  from_iter: 500
  until_iter: 22000
  every: 250
  grad_threshold: 0.00006
  use_absgrad: true
  max_new_points: 5000
  jitter_scale: 0.25
  clone_scale_shrink: 1.0
  split_scale_shrink: 0.6
  split_scale_quantile: 0.75
  split_samples: 2
  new_opacity_scale: 0.8
  max_points: 800000

pruning:
  enabled: true
  every: 2000
  opacity_threshold: 0.002
  min_points: 5000

opacity_reset:
  enabled: true
  every: 3000
  until_iter: 15000
  value: 0.1

learning_rates:
  means_lr: 0.00014
  scales_lr: 0.004
  quats_lr: 0.001
  opacities_lr: 0.04
  colors_lr: 0.0022
  background_lr: 0.001
