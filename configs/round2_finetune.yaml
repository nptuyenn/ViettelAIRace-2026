num_iterations: 40000
log_every: 100
save_every: 1000
sh_degree: 3
lambda_ssim: 0.25
lambda_lpips: 0.02
lpips_from_iter: 30000
lpips_every: 10
lpips_net: alex

background:
  learnable: true
  color: [0.5, 0.5, 0.5]

lr_decay:
  enabled: true
  final_factor: 0.005

densification:
  enabled: false
  from_iter: 500
  until_iter: 15000
  every: 100
  grad_threshold: 0.0002
  max_new_points: 3000
  jitter_scale: 0.25
  scale_shrink: 0.8
  max_points: 500000

pruning:
  enabled: true
  every: 2000
  opacity_threshold: 0.002
  min_points: 5000

opacity_reset:
  enabled: false
  every: 3000
  until_iter: 15000
  value: 0.1

learning_rates:
  means_lr: 0.00008
  scales_lr: 0.0025
  quats_lr: 0.0005
  opacities_lr: 0.02
  colors_lr: 0.0015
  background_lr: 0.001
